name: Deploy Marananusmrti

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: marananusmrti-deploy-main
  cancel-in-progress: true

env:
  PROJECT_ID: gen-lang-client-0390414473
  WORKLOAD_IDENTITY_PROVIDER: projects/887525091528/locations/global/workloadIdentityPools/github-actions-pool/providers/marananusmrti-provider
  SERVICE_ACCOUNT: 887525091528-compute@developer.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate types
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Submit Cloud Build deploy
        run: >
          gcloud builds submit
          --project "${PROJECT_ID}"
          --config cloudbuild.yaml
          --substitutions "REPO_NAME=marananusmrti,COMMIT_SHA=${GITHUB_SHA}"
